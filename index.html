<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>帰宅班マップ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; background: #f0f2f5; }
    #map { width: 100vw; height: 100vh; z-index: 1; }
    .floating-panel {
      position: absolute; z-index: 1000; background: rgba(255,255,255,0.98);
      border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px); border: 2px solid #333;
    }
    #form-panel { top: 10px; left: 10px; width: 310px; padding: 15px; }
    .panel-title { font-size: 16px; font-weight: 900; color: #ff0000; margin-bottom: 12px; border-left: 6px solid #ff0000; padding-left: 10px; }
    
    .input-container { position: relative; margin-bottom: 10px; }
    input, select { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 14px; font-weight: bold; }
    select { margin-bottom: 10px; } 
  
    .clear-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; background: #999; color: white; border-radius: 50%;
      text-align: center; line-height: 22px; cursor: pointer; font-size: 16px; font-weight: bold;
      display: none; z-index: 5;
    }
    input:not(:placeholder-shown) + .clear-btn { display: block; }

    #pac-input { border: 2px solid #ff0000; background: #fffbe6; padding-right: 40px; }
    #inp-coords { padding-right: 40px; }
    
    #btn-calc { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 16px; box-shadow: 0 4px 0 #b30000; margin-top: 5px; }
    #btn-calc:active { transform: translateY(2px); box-shadow: none; }
    #result-panel { top: 10px; right: 10px; width: 310px; padding: 20px; background: #1a252f; color: white; display: none; text-align: center; border: 3px solid #f1c40f; }
    .res-val { font-size: 42px; font-weight: 900; color: #f1c40f; line-height: 1; font-family: 'Courier New', monospace; }
    .dist-box-label { background: #ff0000 !important; color: #ffffff !important; border: 2px solid #ffffff; border-radius: 4px; font-weight: 900; font-size: 14px; width: 55px !important; height: 26px !important; line-height: 22px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
    .area-label-ultra { background: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 50%; width: 40px !important; height: 40px !important; line-height: 36px; text-align: center; font-weight: 900; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
      border-radius: 50px; font-size: 14px; font-weight: bold; z-index: 2000;
      display: none; opacity: 0; transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="form-panel" class="floating-panel">
  <div class="panel-title">帰宅班マップ</div>
  <select id="sel-store"></select>
  
  <div class="input-container">
    <input id="pac-input" type="text" placeholder="住所・施設名を入力して選択">
    <div class="clear-btn" onclick="clearInput('pac-input')">×</div>
  </div>

  <div class="input-container">
    <input type="text" id="inp-coords" placeholder="緯度, 経度">
    <div class="clear-btn" onclick="clearInput('inp-coords')">×</div>
  </div>
  
  <button id="btn-calc">判定を実行</button>
</div>

<div id="result-panel" class="floating-panel">
  <div style="display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px;">
    <div><span style="font-size:12px; color:#f1c40f; display:block;">距離</span><span id="res-dist" class="res-val">--</span></div>
    <div><span style="font-size:12px; color:#f1c40f; display:block;">方角</span><span id="res-hour" class="res-val">--</span></div>
  </div>
  <div id="res-detail" style="font-size:12px; color:#bdc3c7; margin-bottom:10px;"></div>
  <button onclick="this.parentElement.style.display='none'" style="width:100%; padding:8px; background:#444; border:none; color:white; border-radius:4px; cursor:pointer;">閉じる</button>
</div>

<div id="toast">結果をコピーしました</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const GOOGLE_MAPS_API_KEY = "AIzaSyC-LKMRf8BWCC-of9cLBW-3ABhN3_F5Sw4"; 

const STORES = [
  { name: "やすだ大山４号店", lat: 35.7489573, lng: 139.7024786 },
  { name: "やすだ大山駅前５号店", lat: 35.7490262, lng: 139.702254 },
  { name: "やすだ西池袋６号店", lat: 35.7322775, lng: 139.7096135 },
  { name: "やすだ東池袋７号店", lat: 35.7323206, lng: 139.713297 },
  { name: "やすだ東池袋９号店", lat: 35.7321962, lng: 139.7131243 },
  { name: "やすだ清水町店", lat: 35.7623177, lng: 139.7067353 },
  { name: "やすだ仲宿店", lat: 35.7531155, lng: 139.7097483 },
  { name: "やすだ稲毛駅前店", lat: 35.6370021, lng: 140.0934135 },
  { name: "やすだ幕張店", lat: 35.6595189, lng: 140.0490108 },
  { name: "やすだ三郷店", lat: 35.8346346, lng: 139.8782249 },
  { name: "やすだ南流山店", lat: 35.8395675, lng: 139.9052333 },
  { name: "やすだ東大宮店", lat: 35.9475073, lng: 139.6402475 },
  { name: "やすだ相模原店", lat: 35.5742511, lng: 139.3703126 },
  { name: "やすだ所沢店", lat: 35.80974, lng: 139.5210794 },
  { name: "やすだひばりヶ丘店", lat: 35.751145, lng: 139.5457364 },
  { name: "やすだ柏店", lat: 35.8815891, lng: 139.952843 },
  { name: "やすだ戸田店", lat: 35.8166037, lng: 139.6678818 },
  { name: "やすだ八潮店", lat: 35.80658, lng: 139.8254406 },
  { name: "やすだ前橋店", lat: 36.3779796, lng: 139.0944257 },
  { name: "やすだ朝霞店", lat: 35.7992488, lng: 139.5945771 },
  { name: "やすだ大和店", lat: 35.4960645, lng: 139.4647883 }
];

let map, guideLayer, calcLayer;

function clearInput(id) {
  const el = document.getElementById(id);
  el.value = '';
  el.focus();
}

function loadGoogleMaps() {
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&callback=init&loading=async`;
  script.async = true;
  document.head.appendChild(script);
}

function init(){
  const selector = document.getElementById('sel-store');
  selector.innerHTML = "";
  STORES.forEach((s, i) => { const o = document.createElement('option'); o.value = i; o.textContent = s.name; selector.appendChild(o); });
  
  if (map) { map.remove(); }
  map = L.map('map', { zoomControl: false });
  
  if (GOOGLE_MAPS_API_KEY) {
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);
    
    if (typeof google !== 'undefined' && google.maps && google.maps.places) {
      const autocomplete = new google.maps.places.Autocomplete(document.getElementById('pac-input'));
      autocomplete.addListener('place_changed', function() {
        const place = autocomplete.getPlace();
        if (place.geometry) {
          document.getElementById('inp-coords').value = `${place.geometry.location.lat()}, ${place.geometry.location.lng()}`;
          calculate(); 
        }
      });
    }
  } else {
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
      attribution: "国土地理院"
    }).addTo(map);
  }
  
  guideLayer = L.featureGroup().addTo(map);
  calcLayer = L.featureGroup().addTo(map);
  selector.onchange = updateView;
  document.getElementById('btn-calc').onclick = calculate;
  document.getElementById('inp-coords').onkeypress = (e) => { if (e.key === 'Enter') calculate(); };
  updateView();
}

function getDestPoint(lat, lng, dist, angle) {
  const R = 6371000, d = dist / R, a = angle * Math.PI / 180, la1 = lat * Math.PI / 180, lo1 = lng * Math.PI / 180;
  const la2 = Math.asin(Math.sin(la1) * Math.cos(d) + Math.cos(la1) * Math.sin(d) * Math.cos(a));
  const lo2 = lo1 + Math.atan2(Math.sin(a) * Math.sin(d) * Math.cos(la1), Math.cos(d) - Math.sin(la1) * Math.sin(la2));
  return { lat: la2 * 180 / Math.PI, lng: lo2 * 180 / Math.PI };
}

function drawGuides(lat, lng) {
  const radii = [5000, 10000, 15000, 20000, 25000, 30000, 35000, 40000];
  for (let i = 0; i < 12; i++) {
    const end = getDestPoint(lat, lng, 42000, (i * 30 - 15));
    L.polyline([[lat, lng], [end.lat, end.lng]], { color: '#ff0000', weight: 4, opacity: 0.3 }).addTo(guideLayer);
    const numPos = getDestPoint(lat, lng, 25000, i * 30);
    L.marker([numPos.lat, numPos.lng], { icon: L.divIcon({ className: 'area-label-ultra', html: i.toString().padStart(2, '0') }), interactive: false }).addTo(guideLayer);
  }
  radii.forEach(r => {
    L.circle([lat, lng], { radius: r, color: '#ff0000', weight: 5, fillOpacity: 0, opacity: 0.6 }).addTo(guideLayer);
    const labelPos = getDestPoint(lat, lng, r, 225); 
    L.marker([labelPos.lat, labelPos.lng], { icon: L.divIcon({ className: 'dist-box-label', html: `<span>${r / 1000}km</span>` }), interactive: false }).addTo(guideLayer);
  });
}

function updateView() {
  const store = STORES[document.getElementById('sel-store').value];
  guideLayer.clearLayers(); calcLayer.clearLayers();
  document.getElementById('result-panel').style.display = 'none';
  drawGuides(store.lat, store.lng);
  L.marker([store.lat, store.lng]).addTo(guideLayer).bindPopup(`<strong>${store.name}</strong>`).openPopup();
  map.setView([store.lat, store.lng], 12);
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.opacity = '1'; }, 10);
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => { toast.style.display = 'none'; }, 300);
  }, 2000);
}

function calculate() {
  const store = STORES[document.getElementById('sel-store').value];
  const input = document.getElementById('inp-coords').value.trim();
  const match = input.match(/(-?\d+\.?\d*)\s*[,\s]\s*(-?\d+\.?\d*)/);
  if (!match) { alert("有効な地点を選択または入力してください。"); return; }
  const target = { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };

  const R = 6371;
  const dLat = (target.lat - store.lat) * Math.PI / 180;
  const dLon = (target.lng - store.lng) * Math.PI / 180;
  const a = Math.sin(dLat / 2)**2 + Math.cos(store.lat * Math.PI / 180) * Math.cos(target.lat * Math.PI / 180) * Math.sin(dLon / 2)**2;
  const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  if (dist > 45) { alert("判定エリア外（45km超）です。"); return; }
  calcLayer.clearLayers();

  const bearing = (Math.atan2(Math.sin(dLon) * Math.cos(target.lat * Math.PI / 180), Math.cos(store.lat * Math.PI / 180) * Math.sin(target.lat * Math.PI / 180) - Math.sin(store.lat * Math.PI / 180) * Math.cos(target.lat * Math.PI / 180) * Math.cos(dLon)) * 180 / Math.PI + 360) % 360;
  const hour = Math.floor(((bearing + 15) % 360) / 30);
  const distClass = Math.ceil(dist / 5) * 5;

  const path = [];
  const startA = hour * 30 - 15, endA = hour * 30 + 15;
  for (let deg = startA; deg <= endA; deg += 2) path.push(getDestPoint(store.lat, store.lng, distClass * 1000, deg));
  for (let deg = endA; deg >= startA; deg -= 2) path.push(getDestPoint(store.lat, store.lng, (distClass - 5) * 1000, deg));
  
  L.polygon(path.map(p => [p.lat, p.lng]), { color: '#ff0000', weight: 2, fillColor: '#ff0000', fillOpacity: 0.5 }).addTo(calcLayer);
  L.marker([target.lat, target.lng]).addTo(calcLayer);
  L.polyline([[store.lat, store.lng], [target.lat, target.lng]], { color: '#1a252f', weight: 8, opacity: 0.8, dashArray: '10, 10' }).addTo(calcLayer);
  
  const minDiff = 0.045; 
  const diffLat = Math.max(Math.abs(target.lat - store.lat), minDiff);
  const diffLng = Math.max(Math.abs(target.lng - store.lng), minDiff);
  
  const zoomBounds = L.latLngBounds(
    [store.lat - diffLat, store.lng - diffLng],
    [store.lat + diffLat, store.lng + diffLng]
  );
  map.setView([store.lat, store.lng], map.getBoundsZoom(zoomBounds, false, [50, 50]));

  const hStr = hour.toString().padStart(2, '0'), dStr = distClass.toString().padStart(2, '0');
  document.getElementById('res-dist').textContent = dStr;
  document.getElementById('res-hour').textContent = hStr;
  document.getElementById('res-detail').innerHTML = `${dist.toFixed(2)} km / ${Math.round(bearing)}°`;
  document.getElementById('result-panel').style.display = 'block';
  
  navigator.clipboard.writeText(`距離:${dStr} 方角:${hStr}`).then(showToast).catch(() => {});
}

if (GOOGLE_MAPS_API_KEY) { 
  loadGoogleMaps(); 
} else { 
  init(); 
}
</script>
</body>
</html>
