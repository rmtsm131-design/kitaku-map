<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>帰宅班マップ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="openlocationcode.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; background: #f0f2f5; }
    #map { width: 100vw; height: 100vh; z-index: 1; }
    .floating-panel {
      position: absolute; z-index: 1000; background: rgba(255,255,255,0.98);
      border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px); border: 2px solid #333;
    }
    #form-panel { top: 10px; left: 10px; width: calc(100vw - 20px); max-width: 310px; padding: 15px; }
    .panel-title { font-size: 16px; font-weight: 900; color: #ff0000; margin-bottom: 0; border-left: 6px solid #ff0000; padding-left: 10px; }
    .help-link { display: block; text-align: right; font-size: 11px; color: #ff0000; text-decoration: underline; cursor: pointer; margin-bottom: 8px; }
    .step-label { font-size: 11px; font-weight: 900; color: #fff; background: #ff0000; display: inline-block; padding: 2px 7px; border-radius: 10px; margin-bottom: 5px; }
    .input-hint { font-size: 10px; color: #888; margin: 3px 0 6px 2px; line-height: 1.5; }
    .input-wrapper { position: relative; margin-bottom: 4px; }
    .input-wrapper input { padding-right: 44px; }
    .clear-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border-radius: 50%; background: #ccc; border: none;
      color: #fff; font-size: 18px; font-weight: 900; cursor: pointer;
      display: none; align-items: center; justify-content: center; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .clear-btn:active { background: #999; }
    input, select { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 14px; font-weight: bold; }
    #inp-coords { border: 2px solid #ff0000; background: #fffbe6; }
    #btn-calc { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 16px; box-shadow: 0 4px 0 #b30000; }
    #btn-calc:active { transform: translateY(2px); box-shadow: none; }
    .bulk-link { display: block; text-align: center; font-size: 11px; color: #999; text-decoration: none; margin-top: 10px; cursor: pointer; }
    .bulk-link:hover { color: #666; }
    .step-divider { border: none; border-top: 1px dashed #ddd; margin: 10px 0; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 90%; max-width: 380px; max-height: 85vh; border-radius: 15px; padding: 20px; overflow-y: auto; position: relative; }
    .close-btn { background: #444; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    .plus-code-ex { background: #eef2f7; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 13px; border-left: 4px solid #3498db; }

    .version-tag { font-size: 11px; font-weight: 700; color: #999; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .version-tag:hover { color: #666; }
    .version-history-item { margin-bottom: 14px; }
    .version-history-item .ver-num { font-size: 13px; font-weight: 900; color: #ff0000; }
    .version-history-item .ver-date { font-size: 11px; color: #999; margin-left: 6px; }
    .version-history-item ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 12px; color: #444; line-height: 1.8; }

    #result-panel { position: absolute; left: 10px; width: calc(100vw - 20px); max-width: 310px; padding: 20px; background: #1a252f; color: white; display: none; text-align: center; border: 3px solid #f1c40f; z-index: 1001; }
    .res-val { font-size: 42px; font-weight: 900; color: #f1c40f; line-height: 1; font-family: 'Courier New', monospace; }
    .dist-box-label { background: #ff0000 !important; color: #ffffff !important; border: 2px solid #ffffff; border-radius: 4px; font-weight: 900; font-size: 14px; width: 55px !important; height: 26px !important; line-height: 22px; text-align: center; display: flex; align-items: center; justify-content: center; }
    .area-label-ultra { background: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 50%; width: 40px !important; height: 40px !important; line-height: 36px; text-align: center; font-weight: 900; font-size: 20px; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: bold; z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s; }

    #bulk-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 2000; flex-direction: column; }
    #bulk-header { background: #1a252f; color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 3px solid #ff0000; }
    #bulk-header .bulk-title { font-size: 16px; font-weight: 900; color: #f1c40f; }
    #bulk-header .back-btn { background: #444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
    #bulk-toolbar { background: white; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-bottom: 1px solid #ddd; flex-wrap: wrap; }
    #bulk-toolbar button { padding: 8px 18px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 13px; }
    #btn-add-row { background: #eee; color: #333; }
    #btn-run-all { background: #ff0000; color: white; box-shadow: 0 3px 0 #b30000; }
    #btn-run-all:active { transform: translateY(1px); box-shadow: none; }
    #btn-reset-bulk { background: #eee; color: #333; }
    #btn-dl-csv { background: #27ae60; color: white; display: none; }
    #bulk-status { font-size: 12px; color: #888; font-weight: bold; margin-left: auto; }
    #bulk-table-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; }
    #bulk-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    #bulk-table th { background: #1a252f; color: #f1c40f; padding: 10px 12px; font-size: 13px; text-align: left; }
    #bulk-table td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    #bulk-table tr:last-child td { border-bottom: none; }
    #bulk-table tr:hover td { background: #fafafa; }
    .bulk-name-input { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; min-width: 100px; }
    .bulk-store-select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; min-width: 160px; }
    .bulk-coord-wrap { position: relative; min-width: 180px; }
